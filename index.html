<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta name="description" content="Скачивание приложений из RuStore — удобный поиск, версии, скриншоты и отзывы.">
    <title>RuStore Search & Download</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://www.rustore.ru/favicon.ico">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">RuStore Search & Download</h1>
        
        <!-- Поиск по названию -->
        <div class="max-w-2xl mx-auto mb-4 relative">
            <input type="text" 
                   id="searchInput" 
                   class="w-full px-4 py-3 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Поиск приложений...">
            <button id="clearSearch" 
                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden"
                    aria-label="Очистить поиск">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>

        <!-- Поиск по ссылке -->
        <div class="max-w-2xl mx-auto mb-8 relative">
            <input type="text" 
                   id="urlInput" 
                   class="w-full px-4 py-3 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Вставьте ссылку на приложение из RuStore (например, https://www.rustore.ru/catalog/app/com.example.app)">
            <button id="clearUrlSearch" 
                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden"
                    aria-label="Очистить ссылку">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                </svg>
            </button>
            <button id="searchByUrlBtn" 
                    class="absolute right-12 top-1/2 transform -translate-y-1/2 bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">
                Найти
            </button>
        </div>

        <div id="searchResults" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Результаты поиска -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-6 mt-8 border-t border-gray-200">
        <a href="https://github.com/ant783/rustore-search" 
           target="_blank" 
           rel="noopener noreferrer"
           class="inline-flex items-center gap-2 text-gray-600 hover:text-gray-900 transition-colors">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
            </svg>
            <span>Исходный код на GitHub</span>
        </a>
    </footer>

    <!-- Модальные окна -->
    <div id="downloadModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Окно загрузки">
        <div class="modal-content">
            <button type="button" class="modal-close" aria-label="Закрыть">&times;</button>
            <h2 class="text-2xl font-bold mb-4">Скачивание</h2>
            <div id="downloadResults" class="block m-0 font-mono text-sm"></div>
        </div>
    </div>

    <div id="versionModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="История версий">
        <div class="modal-content">
            <button type="button" class="modal-close" aria-label="Закрыть">&times;</button>
            <h2 class="text-2xl font-bold mb-4">История версий</h2>
            <div id="versionHistory" class="space-y-4"></div>
        </div>
    </div>

    <div id="imagePreviewModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Просмотр изображений">
        <div class="modal-content">
            <button type="button" class="modal-close imageClose" aria-label="Закрыть">&times;</button>
            <div class="relative">
                <img id="previewImage" src="" alt="Предварительный просмотр" class="max-h-[90vh] max-w-[90vw] object-contain">
                <button id="prevImage" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-2 rounded-full hover:bg-black/70 transition-colors" aria-label="Предыдущее изображение">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <button id="nextImage" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-2 rounded-full hover:bg-black/70 transition-colors" aria-label="Следующее изображение">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                <div id="imageProgress" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/50 text-white px-4 py-2 rounded-full text-sm" aria-live="polite"></div>
            </div>
        </div>
    </div>

    <div id="descriptionModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Описание приложения">
        <div class="modal-content">
            <button type="button" class="modal-close" aria-label="Закрыть">&times;</button>
            <h2 class="text-2xl font-bold mb-4">Описание приложения</h2>
            <div id="descriptionContent" class="text-gray-700 whitespace-pre-wrap"></div>
        </div>
    </div>

    <div id="commentsModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Отзывы о приложении">
        <div class="modal-content">
            <button type="button" class="modal-close" aria-label="Закрыть">&times;</button>
            <h2 id="appCommentsHeader" class="text-2xl font-bold mb-4"></h2>
            <select id="commentsFilterOption" class="bg-gray-50 border mr-2 mb-4 border-gray-300 text-gray-900 rounded-lg">
                <option value="NEW_FIRST">Сначала новые</option>
                <option value="USEFUL_FIRST">Сначала полезные</option>
                <option value="POSITIVE_FIRST">Сначала положительные</option>
                <option value="NEGATIVE_FIRST">Сначала отрицательные</option>
            </select>
            <div id="appCommentsBody" class="space-y-4"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
